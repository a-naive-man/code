<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .speak {
            color: blue;
        }
        .big {
            font-size: 40px;
        }
    </style>
</head>
<body>
    <h1>川端康成</h1>
    <h3>代表作有《雪国》、《古都》等</h3>
    <p class="speak big">穿过漫长的隧道，便是雪国</p>
    <p class="speak">因为一朵花很美，所以我要活下去</p>
    <span class="speak">太宰治是一名伟大的作家</span>
</body>
</html>
