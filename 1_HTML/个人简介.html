<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Andrew — 个人简介</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f2;
      --ink: #1a1a1a;
      --muted: #888;
      --accent: #2563eb;
      --line: #e0ddd8;
      --card: #ffffff;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 560px;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.7s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* 顶部装饰线 */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
      animation: fadeUp 0.6s ease 0.1s forwards;
      opacity: 0;
    }
    .top-bar .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }
    .top-bar .label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }
    .top-bar .line {
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    /* 主卡片 */
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 48px 44px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.05);
    }

    /* Avatar */
    .avatar-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.2s forwards;
    }
    .avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--accent);
      flex-shrink: 0;
      border: 2px solid #e0eaff;
    }
    .name-block .name {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .name-block .role {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 400;
    }

    /* 分割线 */
    .divider {
      height: 1px;
      background: var(--line);
      margin: 28px 0;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.3s forwards;
    }

    /* 简介段落 */
    .bio {
      font-size: 15px;
      line-height: 1.75;
      color: #444;
      font-weight: 300;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.35s forwards;
    }
    .bio strong {
      color: var(--ink);
      font-weight: 500;
    }

    /* 技能区 */
    .section-title {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 14px;
    }

    .skills-section {
      margin-top: 32px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.45s forwards;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 400;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--ink);
      transition: border-color 0.2s, color 0.2s;
      cursor: default;
    }
    .tag:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .tag.accent {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: var(--accent);
    }

    /* 学习状态 */
    .status-section {
      margin-top: 28px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.55s forwards;
    }
    .status-card {
      background: #f0f7ff;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px #dcfce7;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px #dcfce7; }
      50% { box-shadow: 0 0 0 6px #bbf7d0; }
    }
    .status-text {
      font-size: 13.5px;
      color: #1d4ed8;
      font-weight: 400;
    }

    /* 底部 */
    .footer {
      margin-top: 36px;
      text-align: center;
      font-size: 12px;
      color: #bbb;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.65s forwards;
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="top-bar">
      <div class="dot"></div>
      <span class="label">Personal Profile</span>
      <div class="line"></div>
    </div>

    <div class="card">

      <div class="avatar-row">
        <div class="avatar">A</div>
        <div class="name-block">
          <div class="name">Andrew</div>
          <div class="role">计算机科学 · 大一在读</div>
        </div>
      </div>

      <div class="divider"></div>

      <p class="bio">
        你好！我是 <strong>Andrew</strong>，一名热爱前端开发的大一新生。<br>
        目前正在系统学习 <strong>HTML / CSS / JavaScript</strong>，
        对页面布局与交互设计充满热情，喜欢把想法变成能在浏览器里跑起来的东西。<br>
        我相信 <strong>持续学习</strong> 和 <strong>动手实践</strong> 是成长最快的方式。
      </p>

      <div class="skills-section">
        <div class="section-title">目前掌握</div>
        <div class="tags">
          <span class="tag accent">HTML</span>
          <span class="tag accent">CSS</span>
          <span class="tag">JavaScript（学习中）</span>
          <span class="tag">C / C++</span>
          <span class="tag">Python 基础</span>
        </div>
      </div>

      <div class="status-section">
        <div class="status-card">
          <div class="status-dot"></div>
          <span class="status-text">正在学习前端开发，期待在真实项目中成长 🚀</span>
        </div>
      </div>

    </div>

    <div class="footer">Made with HTML &amp; CSS · Andrew © 2026</div>

  </div>
</body>
</html>
