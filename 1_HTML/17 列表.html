<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>列表</title>
</head>
<body>
    <h2>把大象放进冰箱要几步</h2>
    <!-- 重要的是语义 -->
    <ol>
        <li>打开冰箱门</li>
        <li>把大象放进去</li>
        <li>关上冰箱门</li>
    </ol>

    <h2>我想去的几个城市</h2>
    <ul>
        <li>北京</li>
        <li>上海</li>
        <li>成都</li>
    </ul>
    <h2>如何更好地学习</h2>
    <dl>
        <dt>明确目标</dt>
        <dd>设定清晰的学习目标</dd>
        <dt>制定计划</dt>
        <dd>合理安排学习时间</dd>
    </dl>
</body>
</html>
