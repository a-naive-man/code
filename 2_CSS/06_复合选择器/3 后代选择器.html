<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后代选择器</title>
    <style>
        ul li {
            color: red;
        }

        ol li {
            color: green;
        }

        .subject #front-end {
            color: blue;
        }
    </style>
</head>

<body>
    <ul>
        <li>项目 1</li>
        <li>项目 2</li>
        <li>项目 3</li>
        <li>
            <a href="#">烫头</a>
        </li>
    </ul>
    <hr>
    <ol>
        <li>张三</li>
        <li>李明</li>
        <li>王五</li>
    </ol>
    <hr>
    <ol class="subject">
        <li id="front-end">前端</li>
        <li>java</li>
        <li>大数据</li>
    </ol>
</body>

</html>
