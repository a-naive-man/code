<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常用控件</title>
</head>
<body>
    <form action="https://search.jd.com/search" target="_blank">
        <!-- 文本输入框 -->
    账户：<input type="text" disabled name="account" value="zhangsan" maxlength="10"><br>
    <!-- 密码输入框 -->
    密码：<input type="password" name="pwd" value="123" maxlength="6"><br>
    <!-- 单选框 -->
    性别：
    <input type="radio" name="gender" value="male">男 
    <input type="radio" name="gender" value="female" checked>女<br>
    <!-- 多选框 -->
    爱好：
    <input type="checkbox" name="hobby" value="smoke">抽烟 
    <input type="checkbox" name="hobby" value="drink">喝酒
    <input type="checkbox" name="hobby" value="sing" checked>唱歌<br>
    其他:
    <textarea name="other" cols="30" rows="5"></textarea><br>
    籍贯：
    <select name="place">
        <option value="beijing" selected>北京</option>
        <option value="shanghai">上海</option>
        <option value="guangzhou">广州</option>
    </select>
    <br>
    <!-- 隐藏域 -->
    <input type="hidden" name="from" value="toutiao">
    <br>
    <!-- 确认按钮第一种写法 -->
    <!-- <button>确认</button> -->
    <!-- 第二种写法 -->
    <input type="submit" value="确认">
    <!-- 重置按钮 -->
    <!-- <button type="reset">重置</button> -->
    <input type="reset" value="重置">
    <!-- 普通按钮 -->
    <button type="button" onclick="checkAccount()">检测账户是否被注册</button>
    </form>
</body>
</html>
