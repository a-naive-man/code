<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单Label</title>
</head>
<body>
    <form action="https://search.jd.com/search" target="_blank">
        <!-- 文本输入框 -->
        <label for="zhanghu">账户：</label>
        <input  id="zhanghu" name="account" value="" maxlength="10"><br>
    <!-- 密码输入框 -->
    <label for="mima">密码：</label>
    <input  id="mima" name="pwd" value="" maxlength="6"><br>
    <!-- 单选框 -->
    性别：
    <input type="radio" name="gender" value="male" id="nan">
    <label for="nan">男</label>
    <input type="radio" name="gender" value="female" id="nv">
    <label for="nv">女</label><br>
    <!-- 多选框 -->
    爱好：
    <label><input type="checkbox" name="hobby" value="smoke">抽烟</label> 
    <label><input type="checkbox" name="hobby" value="drink">喝酒</label>
    <label><input type="checkbox" name="hobby" value="sing">唱歌</label><br>
    其他:
    <label for="qita"></label>
    <textarea id="qita" name="other" cols="30" rows="5"></textarea><br>
    <label>
        籍贯：
    <select name="place">
        <option value="beijing">北京</option>
        <option value="shanghai">上海</option>
        <option value="guangzhou">广州</option>
    </select>
    </label>
    <br>
    <!-- 隐藏域 -->
    <input type="hidden" name="from" value="toutiao">
    <br>
    <!-- 确认按钮第一种写法 -->
    <!-- <button>确认</button> -->
    <!-- 第二种写法 -->
    <input type="submit" value="确认">
    <!-- 重置按钮 -->
    <!-- <button type="reset">重置</button> -->
    <input type="reset" value="重置">
    <!-- 普通按钮 -->
    <button type="button" onclick="checkAccount()">检测账户是否被注册</button>
    </form>
</body>
</html>
